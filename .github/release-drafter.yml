name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
no-changes-template: "- No user-facing changes in this release."

version-resolver:
  major:
    labels:
      - "breaking"
      - "major"
  minor:
    labels:
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "fix"
      - "bug"
      - "dependencies"
      - "chore"
  default: patch

categories:
  - title: "Breaking Changes"
    labels:
      - "breaking"
      - "major"
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "Fixes"
    labels:
      - "fix"
      - "bug"
  - title: "Performance"
    labels:
      - "performance"
      - "perf"
  - title: "Documentation"
    labels:
      - "documentation"
      - "docs"
  - title: "Tests"
    labels:
      - "tests"
      - "test"
  - title: "Maintenance"
    labels:
      - "chore"
      - "dependencies"
      - "refactor"

exclude-labels:
  - "skip-changelog"
  - "no-changelog"

autolabeler:
  - label: "documentation"
    files:
      - "*.md"
      - "docs/**"
  - label: "tests"
    files:
      - "tests/**"
  - label: "ci"
    files:
      - ".github/**"
